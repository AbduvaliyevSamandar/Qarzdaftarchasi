name: qarzdaftar
description: "Magazinlar uchun qarz daftarchasi — mijozlar qarzini boshqarish ilovasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  pinput: ^5.0.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  confetti: ^0.8.0
  flutter_slidable: ^3.1.1

  # Media
  image_picker: ^1.1.2

  # Voice
  speech_to_text: ^7.0.0

  # Export
  excel: ^4.0.6
  pdf: ^3.11.1
  printing: ^5.13.4
  file_picker: ^8.1.4

  # SMS / telephony
  another_telephony: ^0.4.1

  # Background work
  workmanager: ^0.9.0+3

  # Utils
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#0D6EFD"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D6EFD"
  image: assets/branding/splash.png
  android_12:
    color: "#0D6EFD"
    image: assets/branding/splash.png
  fullscreen: false
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/branding/
