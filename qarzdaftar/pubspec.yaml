name: qarzdaftar
description: "Magazinlar uchun qarz daftarchasi — mijozlar qarzini boshqarish ilovasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  intl_phone_field: ^3.2.0
  pinput: ^5.0.0
  fl_chart: ^0.69.0

  # Utils
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
